# Полный стек VideoHub:  postgres + backend + frontend + pgadmin.
# Запуск:  docker compose up -d --build
# Остановка с удалением томов (полный сброс):  docker compose down -v
#
# У тебя уже работает локальный PostgreSQL на 5432 — поэтому postgres
# из compose проброшен на 5433 (host). Внутри docker-сети сервисы
# по-прежнему обращаются к нему как postgres:5432.

services:
  postgres:
    image: postgres:16-alpine
    container_name: videohub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: videohub
      POSTGRES_PASSWORD: videohub
      POSTGRES_DB: videohub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videohub -d videohub"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [videohub]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videohub-backend
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://videohub:videohub@postgres:5432/videohub?sslmode=disable"
      UPLOADS_DIR: "/app/uploads"
      PUBLIC_BASE_URL: "http://localhost:8080"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:8081"
      MAX_VIDEO_BYTES: "524288000"
      MAX_IMAGE_BYTES: "10485760"
      DEFAULT_USER_ID: "11111111-1111-1111-1111-111111111111"
      RESEED_ON_START: "false"
      JWT_SECRET: "videohub-dev-secret-change-me"
      JWT_TTL_HOURS: "168"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin1"
      AUTH_CODE_TTL_MIN: "10"
      AUTH_EXPOSE_CODE: "true"
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [videohub]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videohub-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks: [videohub]

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: videohub-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@videohub.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres
    networks: [videohub]

volumes:
  postgres_data:
  uploads_data:
  pgadmin_data:

networks:
  videohub:
    driver: bridge
