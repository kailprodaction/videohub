server {
    listen 80;
    server_name _;

    # SPA: любые маршруты обслуживает index.html
    root /usr/share/nginx/html;
    index index.html;

    # Прокси API + загрузка файлов на backend.
    # backend — service-имя в docker compose.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 600M;
    }

    location /uploads/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Кешируем статику, html — без кеша.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
